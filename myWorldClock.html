<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul & Sydney World Clock</title>
    <style>
        body { 
            background-color: black; 
            color: white; 
            font-family: Helvetica, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px; 
        }
        
        /* Updated Canvas CSS to force perfect scaling on iOS */
        canvas { 
            margin-top: 30px; 
            width: 100%; 
            max-width: 700px; 
            height: auto; 
            aspect-ratio: 700 / 610; /* Ensures the canvas never squishes into an oval */
        }
        
        .text-widget { text-align: center; font-weight: bold; margin-top: 15px; }
        #dow-display { font-size: 28px; margin-top: 10px; }
        #seoul-display { 
            font-size: 32px; 
            color: #76D4EB; 
            margin-top: 20px;
            font-family: 'Gungsuh', Helvetica, sans-serif;  
        }
        #sydney-display { font-size: 30px; color: #58CD3E; margin-top: 10px; }
    </style>
</head>
<body>
    <canvas id="clockCanvas" width="700" height="610"></canvas>
    <div id="dow-display" class="text-widget"></div>
    <div id="seoul-display" class="text-widget"></div>
    <div id="sydney-display" class="text-widget"></div>
    <script>
        const canvas = document.getElementById("clockCanvas");
        const ctx = canvas.getContext("2d");

        const WIDTH = 700; const HEIGHT = 610; const RADIUS = 300;
        const CNTR_X = WIDTH / 2; const CNTR_Y = HEIGHT / 2;
        const DicKorDoW = {1:"(월)", 2:"(화)", 3:"(수)", 4:"(목)", 5:"(금)", 6:"(토)", 7:"(일)"};
        const DicColDoW = {1:"LightGreen", 2:"Orange", 3:"Blue", 4:"LightBlue", 5:"SlateBlue", 6:"Tomato", 7:"Tomato"};

        // Helper function to get timezone specific formatted time (MM-DD HH:MM)
        function getTzTime(timeZone) {
            const now = new Date();
            // Convert current time to the target timezone
            const tzDate = new Date(now.toLocaleString("en-US", { timeZone: timeZone }));
            const month = String(tzDate.getMonth() + 1).padStart(2, '0');
            const day = String(tzDate.getDate()).padStart(2, '0');
            const hours = String(tzDate.getHours()).padStart(2, '0');
            const minutes = String(tzDate.getMinutes()).padStart(2, '0');
            
            return `${month}-${day} ${hours}:${minutes}`;
        }

        function drawClock() {
            const now = new Date();
            ctx.clearRect(0, 0, WIDTH, HEIGHT); // Clear Canvas

            // Draw Clock Face (Outer Circle)
            ctx.beginPath();
            ctx.arc(CNTR_X, CNTR_Y, RADIUS, 0, 2 * Math.PI);
            ctx.lineWidth = 4;
            ctx.strokeStyle = "coral";
            ctx.stroke();

            // Draw Numbers
            ctx.font = "bold 32px Helvetica";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30 - 90) * (Math.PI / 180);
                const x = CNTR_X + (RADIUS - 20) * Math.cos(angle);
                const y = CNTR_Y + (RADIUS - 20) * Math.sin(angle);
                ctx.fillText(i.toString(), x, y);
            }

            // Draw Year and Date on Canvas
            ctx.font = "bold 32px Helvetica";
            ctx.fillStyle = "wheat";
            ctx.fillText(now.getFullYear().toString().padStart(4, '0'), 100, 590);
            
            const dateStr = String(now.getMonth() + 1).padStart(2, '0') + "-" + String(now.getDate()).padStart(2, '0');
            ctx.fillText(dateStr, 600, 590);

            // Calculate Angles
            const sec = now.getSeconds();
            const min = now.getMinutes();
            const hr = now.getHours();

            const secAngle = sec * 6;
            const minAngle = min * 6 + sec * 0.1;
            const hourAngle = (hr % 12) * 30 + min * 0.5;

            // Draw Hands
            drawHand(hourAngle, RADIUS * 0.5, 7, "white");
            drawHand(minAngle, RADIUS * 0.75, 4, "white");
            drawHand(secAngle, RADIUS * 0.85, 2, "yellow");

            // Draw Center Pin
            ctx.beginPath();
            ctx.arc(CNTR_X, CNTR_Y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "magenta";
            ctx.fill();

            updateTextWidgets(now);
        }

        function drawHand(angleDeg, length, width, color) {
            const angleRad = (angleDeg - 90) * (Math.PI / 180);
            const x = CNTR_X + length * Math.cos(angleRad);
            const y = CNTR_Y + length * Math.sin(angleRad);

            ctx.beginPath();
            ctx.moveTo(CNTR_X, CNTR_Y);
            ctx.lineTo(x, y);
            ctx.lineWidth = width;
            ctx.strokeStyle = color;
            ctx.lineCap = "round";
            ctx.stroke();
        }

        function updateTextWidgets(now) {
            // Day of Week Logic (ISO format: 1=Mon ... 7=Sun)
            let dowNum = now.getDay();
            if (dowNum === 0) dowNum = 7; // Convert Sunday(0) to ISO(7)

            const dowEng = now.toLocaleDateString("en-US", { weekday: 'short' });
            const dowKor = DicKorDoW[dowNum];
            
            const dowDisplay = document.getElementById("dow-display");
            dowDisplay.innerText = `${dowEng} ${dowKor}`;
            dowDisplay.style.color = DicColDoW[dowNum];

            // World Clock Logic
            const timeSeoul = getTzTime("Asia/Seoul");
            const timeSydney = getTzTime("Australia/Sydney");

            document.getElementById("seoul-display").innerText = `🇰🇷 서울: ${timeSeoul}`;
            document.getElementById("sydney-display").innerText = `🇦🇺 Sydney: ${timeSydney}`;
        }

        // Initialize and loop every second
        drawClock();
        setInterval(drawClock, 1000);

    </script>
</body>
</html>
